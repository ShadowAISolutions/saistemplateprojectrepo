        function requestGasVersion() {
          if (gasFrame.contentWindow) {
            gasFrame.contentWindow.postMessage({type: 'gas-version-check'}, '*');
          }
        }
        requestGasVersion();
        gasCheckInterval = setInterval(requestGasVersion, GAS_CHECK_INTERVAL);

        // Safety timeout: if GAS doesn't respond, reload anyway
        console.log('[GAS Poll] Safety timeout set:', GAS_DEPLOY_TIMEOUT / 1000, 'seconds');
        setTimeout(function() {
          console.log('[GAS Poll] Safety timeout reached — forcing reload');
          window.removeEventListener('message', onGasVersion);
          if (gasCheckInterval) clearInterval(gasCheckInterval);
          sessionStorage.setItem('gas-pending-sound', '1');
          window.location.reload();
        }, GAS_DEPLOY_TIMEOUT);
      }

      // Fetch version immediately for display, then start polling after 15s initial delay (5s offset from HTML)
      fetch(gasVersionUrl + '?_cb=' + Date.now(), { cache: 'no-store' })
        .then(function(res) { return res.text(); })
        .then(function(v) {
          currentGasVersion = v.trim();
          if (pillLabel) pillLabel.textContent = 'GAS ' + currentGasVersion;
        })
        .catch(function() {});
      if (pill) pill.style.display = 'flex';
      startCountdown(GAS_INITIAL_DELAY);
      setTimeout(checkGasUpdate, GAS_INITIAL_DELAY);

      // GAS changelog popup — click pill to view GAS changelog
      var gclOverlay = document.getElementById('gcl-overlay');
      var gclBody = document.getElementById('gcl-body');
      var gclCache = null;

      if (pill) {
        pill.addEventListener('click', function(e) {
          e.stopPropagation();
          gclOverlay.style.display = 'flex';
          if (!gclCache) fetchGasChangelog();
        });
      }

      document.getElementById('gcl-close').addEventListener('click', function() { gclOverlay.style.display = 'none'; });
      document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && gclOverlay.style.display === 'flex') gclOverlay.style.display = 'none'; });

      function getGasChangelogUrl() {
        return basePath.substring(0, basePath.lastIndexOf('/') + 1) + 'gs-changelogs/' + pageName + 'gs.changelog.txt';
      }

      function parseGasChangelog(md) {
        var lines = md.split('\n');
        var html = '';
        var inList = false;
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (line.match(/^# /) || line.match(/^`Sections:/) || line.match(/^All notable/)
              || line.match(/^Format follows/) || line.match(/^Developed by:/)) continue;
          if (line.match(/^## \[Unreleased\]/)) continue;
          if (line.match(/^## \[/)) {
            if (inList) { html += '</ul>'; inList = false; }
            var m = line.match(/^## \[([\d.]+g)\].*?— (.+)/);
            if (m) html += '<h3>' + m[1] + ' &mdash; ' + m[2] + '</h3>';
            continue;
          }
          if (line.match(/^### /)) {
            if (inList) { html += '</ul>'; inList = false; }
            html += '<h4>' + line.substring(4) + '</h4>';
            continue;
          }
          if (line.match(/^- /)) {
            if (!inList) { html += '<ul>'; inList = true; }
            html += '<li>' + line.substring(2) + '</li>';
            continue;
          }
        }
        if (inList) html += '</ul>';
        return html || '<p style="color:#888">No changelog entries yet.</p>';
      }

      function fetchGasChangelog() {
        gclBody.innerHTML = '<p style="color:#888">Loading changelog\u2026</p>';
        fetch(getGasChangelogUrl())
          .then(function(res) { if (!res.ok) throw new Error(); return res.text(); })
          .then(function(md) {
            gclCache = parseGasChangelog(md);
            gclBody.innerHTML = gclCache;
            var titleEl = document.getElementById('gcl-title');
            if (titleEl && currentGasVersion) titleEl.textContent = 'GAS Changelog \u2014 ' + currentGasVersion;
          })
          .catch(function() {
            gclBody.innerHTML = '<p style="color:#888">Could not load changelog.</p>';
          });
      }
    })();

    // After reload: show green "Code Ready" splash + play Code Ready sound if GAS update pending
    if (sessionStorage.getItem('gas-pending-sound')) {
      sessionStorage.removeItem('gas-pending-sound');
      showUpdateSplash('splash-code', 'code-sound-data', 'sounds/Code_Ready_Voice_1.mp3');
    }

    // Changelog popup — click version indicator to view page changelog
    (function() {
      var overlay = document.createElement('div');
      overlay.id = 'changelog-overlay';
      overlay.innerHTML = '<div id="changelog-popup"><div id="changelog-header">'
        + '<span id="changelog-title">Changelog</span>'
        + '<button id="changelog-close">&times;</button></div>'
        + '<div id="changelog-body"></div></div>';
      document.body.appendChild(overlay);

      var closeBtn = document.getElementById('changelog-close');
      var body = document.getElementById('changelog-body');
      var changelogCache = null;

      function show() { overlay.style.display = 'flex'; if (!changelogCache) fetchChangelog(); }
      function hide() { overlay.style.display = 'none'; }

      closeBtn.addEventListener('click', hide);
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.style.display === 'flex') hide();
      });

      function getChangelogUrl() {
        var basePath = window.location.href.split('?')[0].split('#')[0];
        var pn = basePath.substring(basePath.lastIndexOf('/') + 1).replace('.html', '');
        if (!pn) pn = 'index';
        return basePath.substring(0, basePath.lastIndexOf('/') + 1) + 'html-changelogs/' + pn + 'html.changelog.txt';
      }

      function parseChangelog(md) {
        var lines = md.split('\n');
        var html = '';
        var inList = false;
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (line.match(/^# /) || line.match(/^`Sections:/) || line.match(/^All notable/)
              || line.match(/^Format follows/) || line.match(/^Developed by:/)) continue;
          if (line.match(/^## \[Unreleased\]/)) continue;
          if (line.match(/^## \[v/)) {
            if (inList) { html += '</ul>'; inList = false; }
            var m = line.match(/^## \[(v[\d.]+w)\].*?— (.+)/);
            if (m) html += '<h3>' + m[1] + ' &mdash; ' + m[2] + '</h3>';
            continue;
          }
          if (line.match(/^### /)) {
            if (inList) { html += '</ul>'; inList = false; }
            html += '<h4>' + line.substring(4) + '</h4>';
            continue;
          }
          if (line.match(/^- /)) {
            if (!inList) { html += '<ul>'; inList = true; }
            html += '<li>' + line.substring(2) + '</li>';
            continue;
          }
        }
        if (inList) html += '</ul>';
        return html || '<p style="color:#888">No changelog entries yet.</p>';
      }

      function fetchChangelog() {
        body.innerHTML = '<p style="color:#888">Loading changelog\u2026</p>';
        fetch(getChangelogUrl())
          .then(function(res) { if (!res.ok) throw new Error(); return res.text(); })
          .then(function(md) {
            changelogCache = parseChangelog(md);
            body.innerHTML = changelogCache;
            var titleEl = document.getElementById('changelog-title');
            var ind = document.getElementById('version-indicator');
            if (ind && titleEl) {
              var lbl = ind.querySelector('.label');
              if (lbl) titleEl.textContent = 'Changelog \u2014 ' + lbl.textContent;
            }
          })
          .catch(function() {
            body.innerHTML = '<p style="color:#888">Could not load changelog.</p>';
          });
      }

      // Attach click handler when version indicator appears
      var obs = new MutationObserver(function() {
        var ind = document.getElementById('version-indicator');
        if (ind && !ind._clBound) {
          ind._clBound = true;
          ind.addEventListener('click', function(e) { e.stopPropagation(); show(); });
          obs.disconnect();
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });
    })();

    // Screen Wake Lock — keep screen on while page is visible
    var _wakeLock = null;
    async function requestWakeLock() {
      try {
        if (navigator.wakeLock) {
          _wakeLock = await navigator.wakeLock.request('screen');
          _wakeLock.addEventListener('release', function() { _wakeLock = null; });
        }
      } catch(e) {}
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
  </script>
</body>
