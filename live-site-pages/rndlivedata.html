  <script>
  (function() {
    'use strict';

    // ── GAS URL ──
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxnhplqv-s116CtveTF-8Efdpd_MWA9RZwdJ0th4-4QK_1cRpngS0CBJemY4Znb6ND7/exec';

    // ── State ──
    var currentUser = sessionStorage.getItem('rnd-user') || '';
    var entries = [];
    var lastSyncTime = 0;
    var dataVersion = '0';
    var isSyncing = false;
    var optimisticEntry = null;

    // ── DOM refs ──
    var nameModal = document.getElementById('name-modal');
    var nameInput = document.getElementById('name-input');
    var nameSubmit = document.getElementById('name-submit');
    var appHeader = document.getElementById('app-header');
    var inputArea = document.getElementById('input-area');
    var feed = document.getElementById('feed');
    var msgInput = document.getElementById('msg-input');
    var sendBtn = document.getElementById('send-btn');
    var syncBtn = document.getElementById('sync-btn');
    var statusDot = document.getElementById('status-dot');
    var lastSyncedEl = document.getElementById('last-synced');
    var staleBanner = document.getElementById('stale-banner');
    var userBadge = document.getElementById('user-badge');
    var errorToast = document.getElementById('error-toast');

    // ── Color from name hash ──
    var AVATAR_COLORS = [
      '#e53935','#d81b60','#8e24aa','#5e35b1','#3949ab',
      '#1e88e5','#039be5','#00897b','#43a047','#c0ca33',
      '#f4511e','#6d4c41','#546e7a','#ff8f00','#00acc1'
    ];
    function hashName(name) {
      var h = 0;
      for (var i = 0; i < name.length; i++) {
        h = ((h << 5) - h) + name.charCodeAt(i);
        h |= 0;
      }
      return Math.abs(h);
    }
    function avatarColor(name) { return AVATAR_COLORS[hashName(name) % AVATAR_COLORS.length]; }
    function avatarInitial(name) { return (name || '?')[0].toUpperCase(); }

    // ── Status helpers ──
    function setStatus(state) {
      statusDot.className = state;
    }
    function updateLastSynced() {
      if (!lastSyncTime) { lastSyncedEl.textContent = ''; return; }
      var ago = Math.round((Date.now() - lastSyncTime) / 1000);
      if (ago < 5) lastSyncedEl.textContent = 'just now';
      else if (ago < 60) lastSyncedEl.textContent = ago + 's ago';
      else if (ago < 3600) lastSyncedEl.textContent = Math.floor(ago / 60) + 'm ago';
      else lastSyncedEl.textContent = Math.floor(ago / 3600) + 'h ago';
    }
    // Update "last synced" display every 10s
    setInterval(updateLastSynced, 10000);

    function showError(msg) {
      errorToast.textContent = msg;
      errorToast.style.display = 'block';
      setTimeout(function() { errorToast.style.display = 'none'; }, 4000);
    }

    // ── Render feed ──
    function renderFeed() {
      feed.innerHTML = '';
      // Show entries newest-first
      var sorted = entries.slice().reverse();
      if (optimisticEntry) {
        sorted.unshift(optimisticEntry);
      }
      sorted.forEach(function(e) {
        var div = document.createElement('div');
        div.className = 'entry' + (e._optimistic ? ' optimistic' : '');

        var avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.style.background = avatarColor(e.user);
        avatar.textContent = avatarInitial(e.user);

        var body = document.createElement('div');
        body.className = 'body';

        var meta = document.createElement('div');
        meta.className = 'meta';
        var uname = document.createElement('span');
        uname.className = 'username';
        uname.textContent = e.user;
        var time = document.createElement('span');
        time.className = 'time';
        time.textContent = formatTime(e.timestamp);
        meta.appendChild(uname);
        meta.appendChild(time);

        var msg = document.createElement('div');
        msg.className = 'msg';
        msg.textContent = e.message;

        body.appendChild(meta);
        body.appendChild(msg);
        div.appendChild(avatar);
        div.appendChild(body);
        feed.appendChild(div);
      });
    }

    function formatTime(ts) {
      if (!ts) return '';
      var d = new Date(ts);
      if (isNaN(d.getTime())) return String(ts);
      var now = new Date();
      var time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (d.toDateString() !== now.toDateString()) {
        return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + time;
      }
      return time;
    }

    // ── API calls ──
    function fetchData() {
      if (isSyncing) return;
      isSyncing = true;
      setStatus('syncing');
      syncBtn.classList.add('loading');
      syncBtn.disabled = true;

      fetch(GAS_URL + '?action=fetch', { redirect: 'follow' })
        .then(function(res) { return res.json(); })
        .then(function(result) {
          if (result.success) {
            entries = result.data || [];
            dataVersion = result.version || '0';
            lastSyncTime = Date.now();
            optimisticEntry = null;
            renderFeed();
            setStatus('ready');
            staleBanner.style.display = 'none';
          } else {
            throw new Error(result.error || 'Fetch failed');
          }
        })
        .catch(function(err) {
          setStatus('error');
          showError('Sync failed: ' + err.message);
          setTimeout(function() { if (!isSyncing) setStatus(lastSyncTime ? 'ready' : ''); }, 3000);
        })
        .finally(function() {
          isSyncing = false;
          syncBtn.classList.remove('loading');
          syncBtn.disabled = false;
          updateLastSynced();
        });
    }

    function submitData(message) {
      // Optimistic UI
      optimisticEntry = {
        timestamp: new Date().toISOString(),
        user: currentUser,
        message: message,
        entryId: 'optimistic-' + Date.now(),
        _optimistic: true
      };
      renderFeed();

      var savedInput = message;
      msgInput.value = '';
      autoResize();
      sendBtn.disabled = true;

      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'submit', user: currentUser, message: message }),
        redirect: 'follow'
      })
        .then(function(res) { return res.json(); })
        .then(function(result) {
          if (result.success) {
            entries = result.data || [];
            dataVersion = result.version || '0';
            lastSyncTime = Date.now();
            optimisticEntry = null;
            renderFeed();
            setStatus('ready');
          } else {
            throw new Error(result.error || 'Submit failed');
          }
        })
        .catch(function(err) {
          // Roll back optimistic entry, restore input
          optimisticEntry = null;
          renderFeed();
          msgInput.value = savedInput;
          autoResize();
          showError('Send failed: ' + err.message);
          setStatus('error');
          setTimeout(function() { if (!isSyncing) setStatus(lastSyncTime ? 'ready' : ''); }, 3000);
        })
        .finally(function() {
          sendBtn.disabled = false;
          updateLastSynced();
        });
    }

    // ── Visibility API — event-driven sync ──
    var wasHidden = false;
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {

        return basePath.substring(0, basePath.lastIndexOf('/') + 1) + 'html-changelogs/' + pn + 'html.changelog.md';
      }

      function parseChangelog(md) {
        var lines = md.split('\n');
        var html = '';
        var inList = false;
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (line.match(/^# /) || line.match(/^`Sections:/) || line.match(/^All notable/)
              || line.match(/^Format follows/) || line.match(/^Developed by:/)) continue;
          if (line.match(/^## \[Unreleased\]/)) continue;
          if (line.match(/^## \[v/)) {
            if (inList) { html += '</ul>'; inList = false; }
            var m = line.match(/^## \[(v[\d.]+w)\].*?— (.+)/);
            if (m) html += '<h3>' + m[1] + ' &mdash; ' + m[2] + '</h3>';
            continue;
          }
          if (line.match(/^### /)) {
            if (inList) { html += '</ul>'; inList = false; }
            html += '<h4>' + line.substring(4) + '</h4>';
            continue;
          }
          if (line.match(/^- /)) {
            if (!inList) { html += '<ul>'; inList = true; }
            html += '<li>' + line.substring(2) + '</li>';
            continue;
          }
        }
        if (inList) html += '</ul>';
        return html || '<p style="color:#888">No changelog entries yet.</p>';
      }

      function fetchChangelog() {
        body.innerHTML = '<p style="color:#888">Loading changelog\u2026</p>';
        fetch(getChangelogUrl())
          .then(function(res) { if (!res.ok) throw new Error(); return res.text(); })
          .then(function(md) {
            changelogCache = sanitizeChangelogHtml(parseChangelog(md));
            body.innerHTML = changelogCache;
            var titleEl = document.getElementById('changelog-title');
            var ind = document.getElementById('version-indicator');
            if (ind && titleEl) {
              var lbl = ind.querySelector('.label');
              if (lbl) titleEl.textContent = 'Changelog \u2014 ' + lbl.textContent;
            }
          })
          .catch(function() {
            body.innerHTML = '<p style="color:#888">Could not load changelog.</p>';
          });
      }

      // Attach click handler when version indicator appears (if changelog enabled)
      var obs = new MutationObserver(function() {
        var ind = document.getElementById('version-indicator');
        if (ind && !ind._clBound) {
          ind._clBound = true;
          if (SHOW_CHANGELOG) {
            ind.addEventListener('click', function(e) { e.stopPropagation(); show(); });
          } else {
            ind.style.cursor = 'default';
          }
          obs.disconnect();
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });
    })();

    // Screen Wake Lock — keep screen on while page is visible
    var _wakeLock = null;
    async function requestWakeLock() {
      try {
        if (navigator.wakeLock) {
          _wakeLock = await navigator.wakeLock.request('screen');
          _wakeLock.addEventListener('release', function() { _wakeLock = null; });
        }
      } catch(e) {}
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
