    // =============================================
    // AUTH — Storage Abstraction (Toggle-Gated)

    // =============================================

    var SESSION_KEY = 'gas_session_token';
    var EMAIL_KEY = 'gas_user_email';

    function getStorage() {
      return HTML_CONFIG.STORAGE_TYPE === 'sessionStorage'
        ? window.sessionStorage
        : window.localStorage;

    function saveSession(sessionToken, email) {
      var storage = getStorage();
      storage.setItem(SESSION_KEY, sessionToken);
      storage.setItem(EMAIL_KEY, email);

    function loadSession() {
      var storage = getStorage();
      return {
        token: storage.getItem(SESSION_KEY),
        email: storage.getItem(EMAIL_KEY)

    function initGoogleSignIn() {

    // AUTH — Token Exchange (Toggle-Gated: url vs postMessage)
    // 'url'         → Append token as URL parameter (standard)
    // 'postMessage' → Secure handshake via window.postMessage (HIPAA)
    // =============================================

    function exchangeToken(googleAccessToken) {
      if (HTML_CONFIG.TOKEN_EXCHANGE_METHOD === 'postMessage') {
        exchangeViaPostMessage(googleAccessToken);
      } else {
        exchangeViaUrl(googleAccessToken);
      }
    }

    // --- URL Parameter Path (standard) ---
    function exchangeViaUrl(googleAccessToken) {
      var gasApp = document.getElementById('gas-app');
      if (!gasApp) { console.log('[AUTH DEBUG] exchangeViaUrl: gas-app element not found!'); return; }
      var baseUrl = window._r || gasApp.dataset.baseUrl || '';
      if (!baseUrl) { console.log('[AUTH DEBUG] exchangeViaUrl: baseUrl is empty!'); return; }

      console.log('[AUTH DEBUG] exchangeViaUrl: setting iframe src to', baseUrl + '?exchangeToken=<token>');
      // Reload iframe with exchangeToken param — GAS doGet() handles the exchange
      gasApp.src = baseUrl + '?exchangeToken=' + encodeURIComponent(googleAccessToken);
    }

    // --- postMessage Path (HIPAA) ---
    var _pendingToken = null;

    function exchangeViaPostMessage(googleAccessToken) {
      _pendingToken = googleAccessToken;
      var gasApp = document.getElementById('gas-app');
      if (!gasApp) return;
      var baseUrl = window._r || gasApp.dataset.baseUrl || '';
      if (!baseUrl) return;

      // Reload iframe to get a fresh postMessage listener page
      gasApp.src = baseUrl;
    }

    // =============================================
    // AUTH — postMessage Listener
    // Handles all auth-related messages from the GAS iframe.
    // =============================================

    window.addEventListener('message', function(event) {
      var data = event.data;
      if (!data || typeof data !== 'object') return;
      console.log('[AUTH DEBUG] postMessage received:', data.type, JSON.stringify(data).substring(0, 200));

      // GAS iframe signals ready for token (postMessage exchange path)
      if (data.type === 'gas-ready-for-token' && _pendingToken) {
        var gasApp = document.getElementById('gas-app');
        if (gasApp && gasApp.contentWindow) {
          gasApp.contentWindow.postMessage({
            type: 'exchange-token',
            accessToken: _pendingToken
          }, '*');
          _pendingToken = null;
        }
      }

      // GAS iframe created a session (both url and postMessage paths)
      if (data.type === 'gas-session-created') {
        if (data.success) {
          saveSession(data.sessionToken, data.email);
          showApp(data.email, data.displayName);
          startInactivityTimer();
          // Reload iframe with session token so the app UI loads
          var gasApp = document.getElementById('gas-app');
          var baseUrl = window._r || (gasApp && gasApp.dataset.baseUrl) || '';
          if (gasApp && baseUrl) {
            _expectingSession = true;
            gasApp.src = baseUrl + '?session=' + encodeURIComponent(data.sessionToken);
          }
        } else {
          showAuthWall('Authentication failed: ' + (data.error || 'Unknown error'), data.email);
        }
      }

      // GAS iframe says auth is needed (session expired/invalid)
      if (data.type === 'gas-needs-auth') {
        if (_expectingSession) {
          // Stale gas-needs-auth from the bare-URL srcdoc race — the iframe
          // was still loading the old (no-session) URL while we already set
          // a new src with the session token. Ignore this message and wait
          // for the session-URL response instead.
          console.log('[AUTH DEBUG] Ignoring stale gas-needs-auth (session navigation in flight)');
          _expectingSession = false;
          return;
        }
        clearSession();
        showAuthWall('Session expired. Please sign in again.');
      }

      // GAS iframe confirms auth is OK (for returning users)
      if (data.type === 'gas-auth-ok') {
        _expectingSession = false;
        if (data.needsReauth) {
          showReauthBanner('Your session is expiring soon. Click to refresh.', true);
        }
      }

      // GAS sign-out confirmation
      if (data.type === 'gas-signed-out') {
        clearSession();
        showAuthWall('You have been signed out.');
      }
    });

          google.accounts.oauth2.revoke(session.token, function() {});

        // before Google Sign-In has a chance to obtain a token. Cancel that
        // navigation by replacing the src, then let initGoogleSignIn handle
        // the auth flow — exchangeViaUrl will navigate the iframe once a
        // token is available.
        var gasApp = document.getElementById('gas-app');
        if (gasApp) {
          // srcdoc takes priority over src in the HTML spec — must remove it
          // to prevent the queued srcdoc script from calling location.replace().
          // Also delete window._r so even if the srcdoc script already ran or
          // is mid-execution, it finds no URL to navigate to.
          delete window._r;
          gasApp.removeAttribute('srcdoc');
          gasApp.src = 'about:blank';
        }
        showAuthWall();
        // Initialize Google Sign-In
        if (typeof google !== 'undefined' && google.accounts) {
          initGoogleSignIn();
        } else {
          // GIS library not yet loaded — wait for it
          window.addEventListener('load', function() {
            initGoogleSignIn();
          });
        }
      }
    })();
