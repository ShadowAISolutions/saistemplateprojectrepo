      var pageName = basePath.substring(basePath.lastIndexOf('/') + 1).replace('.html', '');
      if (!pageName) pageName = 'index';
      var gasVersionUrl = basePath.substring(0, basePath.lastIndexOf('/') + 1) + 'gs-versions/' + pageName + 'gs.version.txt';

      var currentGasVersion = null;
      var pill = document.getElementById('gas-pill');
      var pillLabel = document.getElementById('gas-pill-label');
      var dot = pill ? pill.querySelector('.dot') : null;
      var countdownSeconds = 0;
      var countdownTimer = null;

      function startCountdown(interval) {
        countdownSeconds = (interval || GAS_POLL_INTERVAL) / 1000;
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(function() {
          countdownSeconds--;
          if (countdownSeconds <= 0) {
            clearInterval(countdownTimer);
            if (dot) { dot.textContent = ''; dot.className = 'dot'; }
          } else if (countdownSeconds <= 5) {
            if (dot) { dot.textContent = countdownSeconds; dot.className = 'dot counting'; }
          }
        }, 1000);
      }

      function checkGasUpdate() {
        if (countdownTimer) clearInterval(countdownTimer);
        if (dot) { dot.textContent = ''; dot.className = 'dot checking'; }
        fetch(gasVersionUrl + '?_cb=' + Date.now(), { cache: 'no-store' })
          .then(function(res) { return res.text(); })
          .then(function(v) {
            var fetched = v.trim();
            if (!currentGasVersion) {
              currentGasVersion = fetched;
              if (pill) { pill.style.display = 'flex'; }
              if (pillLabel) pillLabel.textContent = 'GAS ' + fetched;
            } else if (fetched !== currentGasVersion) {
              // GAS version changed on GitHub — reload immediately
              if (dot) dot.className = 'dot found';
              if (pillLabel) pillLabel.textContent = 'GAS updated — reloading...';
              sessionStorage.setItem('gas-pending-sound', '1');
              setTimeout(function() { window.location.reload(); }, 1500);
              return;
            }
            if (dot) setTimeout(function() { dot.className = 'dot'; }, 800);
            // Anti-sync: if GAS poll fired within 3s of HTML poll, add 5s delay to re-establish gap
            var _gasPollDelay = GAS_POLL_INTERVAL;
            if (window._htmlPollTime && Math.abs(Date.now() - window._htmlPollTime) < 3000) {
              _gasPollDelay += 5000;
            }
            startCountdown(_gasPollDelay);
            setTimeout(checkGasUpdate, _gasPollDelay);
          })
          .catch(function() {
            if (dot) {
              dot.className = 'dot error';
              setTimeout(function() { dot.className = 'dot'; }, 2000);
            }
            startCountdown();
            setTimeout(checkGasUpdate, GAS_POLL_INTERVAL);
          });
      }

      // Fetch version immediately — only show GAS pill and start polling if gs.version.txt exists
      fetch(gasVersionUrl + '?_cb=' + Date.now(), { cache: 'no-store' })
        .then(function(res) {
          if (!res.ok) throw new Error('no gs.version.txt');
          return res.text();
        })
        .then(function(v) {
          currentGasVersion = v.trim();
          if (pillLabel) pillLabel.textContent = 'GAS ' + currentGasVersion;
          if (pill) pill.style.display = 'flex';
          startCountdown(GAS_INITIAL_DELAY);
          setTimeout(checkGasUpdate, GAS_INITIAL_DELAY);
        })
        .catch(function() { /* no gs.version.txt — GAS pill stays hidden, no polling */ });

      // GAS changelog popup — click pill to view GAS changelog
      var gclOverlay = document.getElementById('gcl-overlay');
      var gclBody = document.getElementById('gcl-body');
      var gclCache = null;

      if (pill) {
        if (SHOW_CHANGELOG) {
          pill.addEventListener('click', function(e) {
            e.stopPropagation();
            gclOverlay.style.display = 'flex';
            if (!gclCache) fetchGasChangelog();
          });
        } else {
          pill.style.cursor = 'default';
        }
      }

      document.getElementById('gcl-close').addEventListener('click', function() { gclOverlay.style.display = 'none'; });
      document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && gclOverlay.style.display === 'flex') gclOverlay.style.display = 'none'; });

      function getGasChangelogUrl() {
        return basePath.substring(0, basePath.lastIndexOf('/') + 1) + 'gs-changelogs/' + pageName + 'gs.changelog.md';
      }

      function parseGasChangelog(md) {
        var lines = md.split('\n');
        var html = '';
        var inList = false;
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (line.match(/^# /) || line.match(/^`Sections:/) || line.match(/^All notable/)
              || line.match(/^Format follows/) || line.match(/^Developed by:/)) continue;
          if (line.match(/^## \[Unreleased\]/)) continue;
          if (line.match(/^## \[/)) {
            if (inList) { html += '</ul>'; inList = false; }
            var m = line.match(/^## \[(v[\d.]+g)\].*?— (.+)/);
            if (m) html += '<h3>' + m[1] + ' &mdash; ' + m[2] + '</h3>';
            continue;
          }
          if (line.match(/^### /)) {
            if (inList) { html += '</ul>'; inList = false; }
            html += '<h4>' + line.substring(4) + '</h4>';
            continue;
          }
          if (line.match(/^- /)) {
            if (!inList) { html += '<ul>'; inList = true; }
            html += '<li>' + line.substring(2) + '</li>';
            continue;
          }
        }
        if (inList) html += '</ul>';
        return html || '<p style="color:#888">No changelog entries yet.</p>';
      }

      function fetchGasChangelog() {
        gclBody.innerHTML = '<p style="color:#888">Loading changelog\u2026</p>';
        fetch(getGasChangelogUrl())
          .then(function(res) { if (!res.ok) throw new Error(); return res.text(); })
          .then(function(md) {
            gclCache = parseGasChangelog(md);
            gclBody.innerHTML = gclCache;
            var titleEl = document.getElementById('gcl-title');
            if (titleEl && currentGasVersion) titleEl.textContent = 'GAS Changelog \u2014 ' + currentGasVersion;
          })
          .catch(function() {
            gclBody.innerHTML = '<p style="color:#888">Could not load changelog.</p>';
          });
      }
    })();

    // After reload: show blue "Code Ready" splash if GAS update pending
    if (sessionStorage.getItem('gas-pending-sound')) {
      sessionStorage.removeItem('gas-pending-sound');
      var codeSplash = document.getElementById('splash-code');
      if (codeSplash) {
        codeSplash.style.display = 'flex';
        setTimeout(function() {
          codeSplash.style.opacity = '0';
          setTimeout(function() { codeSplash.style.display = 'none'; }, 300);
        }, 1000);
      }
    }

// ══════════════
// TEMPLATE END
// ══════════════

// ══════════════
// AUTH START
// ══════════════

    // =============================================
    // AUTH — Storage Abstraction (Toggle-Gated)
    // sessionStorage clears on tab close (HIPAA).
    // localStorage persists across sessions (standard).
    // =============================================

    var SESSION_KEY = 'gas_session_token';
    var EMAIL_KEY = 'gas_user_email';

    function getStorage() {
      return HTML_CONFIG.STORAGE_TYPE === 'sessionStorage'
        ? window.sessionStorage
        : window.localStorage;
    }

    function saveSession(sessionToken, email) {
      var storage = getStorage();
      storage.setItem(SESSION_KEY, sessionToken);
      storage.setItem(EMAIL_KEY, email);
    }

    function loadSession() {
      var storage = getStorage();
      return {
        token: storage.getItem(SESSION_KEY),
        email: storage.getItem(EMAIL_KEY)
      };
    }

    function clearSession() {
      var storage = getStorage();
      storage.removeItem(SESSION_KEY);
      storage.removeItem(EMAIL_KEY);
      _messageKey = null;
    }

    // =============================================
    // AUTH — Google Sign-In (GIS)
    // Silent re-auth with interactive fallback.
    // =============================================

    var GAS_ORIGIN = 'https://script.google.com';
    var gasFrame = document.getElementById('gas-app');
    var signInClient = null;
    var _expectingSession = false;

    function initGoogleSignIn() {
      signInClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: 'openid email profile',
        prompt: '',
        callback: handleTokenResponse
      });
      signInClient.requestAccessToken();
    }

    function handleTokenResponse(response) {
      if (response.error) {
        showAuthWall('Click "Sign In with Google" to continue.');
        return;
      }
      exchangeToken(response.access_token);
    }

    // =============================================
    // AUTH — Token Exchange (Toggle-Gated: url vs postMessage)
    // =============================================

    function exchangeToken(googleAccessToken) {
      if (HTML_CONFIG.TOKEN_EXCHANGE_METHOD === 'postMessage') {
        exchangeViaPostMessage(googleAccessToken);
      } else {
        exchangeViaUrl(googleAccessToken);
      }
    }

    function exchangeViaUrl(googleAccessToken) {
      var gasApp = document.getElementById('gas-app');
      if (!gasApp) return;
      var baseUrl = window._r || gasApp.dataset.baseUrl || '';
      if (!baseUrl) return;
      gasApp.src = baseUrl + '?exchangeToken=' + encodeURIComponent(googleAccessToken);
    }

    var _pendingToken = null;

    function exchangeViaPostMessage(googleAccessToken) {
      _pendingToken = googleAccessToken;
      var gasApp = document.getElementById('gas-app');
      if (!gasApp) return;
      var baseUrl = window._r || gasApp.dataset.baseUrl || '';
      if (!baseUrl) return;
      gasApp.src = baseUrl;
    }

    // =============================================
    // AUTH — postMessage Listener
    // =============================================

    var _KNOWN_GAS_MESSAGES = {
      'gas-ready-for-token': true,
      'gas-session-created': true,
      'gas-needs-auth': true,
      'gas-auth-ok': true,
      'gas-heartbeat-ok': true,
      'gas-heartbeat-expired': true,
      'gas-signed-out': true,
      'gas-version': true
    };

    var _messageKey = null;

    function _verifyMessageSignature(data, key) {
      if (!key) return true;
      var sig = data._sig;
      if (!sig) return false;
      var copy = {};
      for (var k in data) { if (k !== '_sig') copy[k] = data[k]; }
      var payload = JSON.stringify(copy) + '|' + key;
      var hash = 0;
      for (var i = 0; i < payload.length; i++) {
        hash = ((hash << 5) - hash) + payload.charCodeAt(i);
        hash |= 0;
      }
      return sig === hash.toString(36);
    }

    window.addEventListener('message', function(event) {
      var data = event.data;
      if (!data || typeof data !== 'object') return;
      if (!_KNOWN_GAS_MESSAGES[data.type]) return;

      if (data.type === 'gas-session-created' && data.success && data.messageKey) {
        _messageKey = data.messageKey;
      }
      if (_messageKey && data.type !== 'gas-session-created' && data.type !== 'gas-needs-auth') {
        if (!_verifyMessageSignature(data, _messageKey)) return;
      }

      // GAS iframe signals ready for token (postMessage exchange path)
      if (data.type === 'gas-ready-for-token' && _pendingToken) {
        if (event.source) {
          event.source.postMessage({
            type: 'exchange-token',
            accessToken: _pendingToken
          }, '*');
          _pendingToken = null;
        }
      }

      // GAS iframe created a session
      if (data.type === 'gas-session-created') {
        if (data.success) {
          saveSession(data.sessionToken, data.email);
          showApp(data.email, data.displayName);
          // Reload iframe with session token so the app UI loads
          var gasApp = document.getElementById('gas-app');
          var baseUrl = window._r || (gasApp && gasApp.dataset.baseUrl) || '';
          if (gasApp && baseUrl) {
            _expectingSession = true;
            gasApp.src = baseUrl + '?session=' + encodeURIComponent(data.sessionToken);
          }
        } else {
          showAuthWall('Authentication failed: ' + (data.error || 'Unknown error'), data.email);
        }
      }

      // GAS iframe says auth is needed
      if (data.type === 'gas-needs-auth') {
        if (_expectingSession) {
          _expectingSession = false;
          return;
        }
        clearSession();
        showAuthWall('Session expired. Please sign in again.');
      }

      // GAS iframe confirms auth is OK
      if (data.type === 'gas-auth-ok') {
        _expectingSession = false;
      }

      // Heartbeat expired
      if (data.type === 'gas-heartbeat-expired') {
        clearSession();
        showAuthWall('Session expired. Please sign in again.');
      }

      // GAS sign-out confirmation
      if (data.type === 'gas-signed-out') {
        clearSession();
        showAuthWall('You have been signed out.');
      }
    });

    // =============================================
    // AUTH — Cross-Tab Session Sync
    // =============================================

    window.addEventListener('storage', function(e) {
      if (e.key === SESSION_KEY && !e.oldValue && e.newValue) {
        var session = loadSession();
        if (session.token) {
          showApp(session.email);
          var gasApp = document.getElementById('gas-app');
          var baseUrl = window._r || (gasApp && gasApp.dataset.baseUrl) || '';
          if (gasApp && baseUrl) {
            _expectingSession = true;
            gasApp.src = baseUrl + '?session=' + encodeURIComponent(session.token);
          }
        }
      }
      if (e.key === SESSION_KEY && e.oldValue && !e.newValue) {
        clearSession();
        showAuthWall('You have been signed out in another tab.');
      }
    });

    var _signOutChannel = null;
    if (HTML_CONFIG.STORAGE_TYPE === 'sessionStorage' && typeof BroadcastChannel !== 'undefined') {
      _signOutChannel = new BroadcastChannel('portal-sign-out');
      _signOutChannel.onmessage = function(e) {
        if (e.data && e.data.type === 'sign-out') {
          clearSession();
          showAuthWall('You have been signed out in another tab.');
        }
      };
    }

    // =============================================
    // AUTH — UI State Management
    // =============================================

    function showAuthWall(message, email) {
      var wall = document.getElementById('auth-wall');
      var errorEl = document.getElementById('auth-error');
      var emailEl = document.getElementById('auth-email');
      var userPill = document.getElementById('user-pill');

      wall.classList.remove('hidden');
      userPill.style.display = 'none';

      if (message) {
        errorEl.textContent = message;
        errorEl.style.display = 'block';
      } else {
        errorEl.style.display = 'none';
      }
      if (email) {
        emailEl.textContent = email;
        emailEl.style.display = 'block';
      } else {
        emailEl.style.display = 'none';
      }
    }

    function showApp(email, displayName) {
      var wall = document.getElementById('auth-wall');
      var userPill = document.getElementById('user-pill');
      var emailDisplay = document.getElementById('user-email-display');

      wall.classList.add('hidden');

      if (email) {
        emailDisplay.textContent = email;
        userPill.style.display = 'flex';
      }
    }

    // =============================================
    // AUTH — Sign Out (via GAS)
    // =============================================

    function performSignOut() {
      var session = loadSession();
      if (session.token) {
        // Tell GAS to invalidate the server-side session
        var gasApp = document.getElementById('gas-app');
        var baseUrl = window._r || (gasApp && gasApp.dataset.baseUrl) || '';
        if (gasApp && baseUrl) {
          gasApp.src = baseUrl + '?signOut=' + encodeURIComponent(session.token);
        }
      }
      clearSession();

      // Cross-tab sign-out
      if (HTML_CONFIG.STORAGE_TYPE === 'sessionStorage' && _signOutChannel) {
        _signOutChannel.postMessage({ type: 'sign-out' });
      }

      showAuthWall('You have been signed out.');
    }

    // =============================================
    // AUTH — Initialization
    // =============================================

    document.getElementById('auth-sign-in-btn').addEventListener('click', function() {
      signInClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: 'openid email profile',
        prompt: 'select_account',
        callback: handleTokenResponse
      });
      signInClient.requestAccessToken();
    });

    document.getElementById('sign-out-btn').addEventListener('click', function() {
      performSignOut();
    });

    // On page load: check for existing session or wait for sign-in
    (function() {
      var session = loadSession();
      if (session.token) {
        showApp(session.email);
        // Resume session — load GAS iframe with session token
        var gasApp = document.getElementById('gas-app');
        var baseUrl = window._r || (gasApp && gasApp.dataset.baseUrl) || '';
        if (gasApp && baseUrl) {
          _expectingSession = true;
          gasApp.src = baseUrl + '?session=' + encodeURIComponent(session.token);
        }
      } else {
        showAuthWall();
      }
    })();

// AUTH END
