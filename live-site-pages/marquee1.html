<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="build-version" content="v01.03w">
<title>Police &amp; Fire Clinic — Loading</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
    color: #333;
  }

  .signin-wrapper {
    text-align: center;
    max-width: 420px;
    width: 100%;
    padding: 2rem 1.5rem;
  }

  /* ── Logo & title ── */
  .logo {
    width: 100px;
    height: auto;
    margin-bottom: 0.75rem;
  }
  .app-title {
    color: #2e7d32;
    font-size: 1.25rem;
    font-weight: 600;
    margin-bottom: 2rem;
  }
  .signin-heading {
    font-size: 1.5rem;
    font-weight: 300;
    color: #444;
    margin-bottom: 0.5rem;
  }

  /* ── Dog sprite (replaces spinner) ── */
  .dog-wrap {
    width: 132px;   /* 732 × 0.18 */
    height: 82px;   /* 456 × 0.18 */
    overflow: hidden;
    margin: 0.5rem auto 1rem;
  }
  .dog {
    width: 732px;
    height: 456px;
    transform: scale(0.18);
    transform-origin: top left;
    background: url('images/dog-marquee1.png') 0 0 no-repeat;
    background-size: 4392px 2736px;
    animation: spriteFrames 1.2s steps(1) infinite;
  }

  @keyframes spriteFrames {
    0%       { background-position: 0px 0px; }
    2.778%   { background-position: -732px 0px; }
    5.556%   { background-position: -1464px 0px; }
    8.333%   { background-position: -2196px 0px; }
    11.111%  { background-position: -2928px 0px; }
    13.889%  { background-position: -3660px 0px; }
    16.667%  { background-position: 0px -456px; }
    19.444%  { background-position: -732px -456px; }
    22.222%  { background-position: -1464px -456px; }
    25.0%    { background-position: -2196px -456px; }
    27.778%  { background-position: -2928px -456px; }
    30.556%  { background-position: -3660px -456px; }
    33.333%  { background-position: 0px -912px; }
    36.111%  { background-position: -732px -912px; }
    38.889%  { background-position: -1464px -912px; }
    41.667%  { background-position: -2196px -912px; }
    44.444%  { background-position: -2928px -912px; }
    47.222%  { background-position: -3660px -912px; }
    50.0%    { background-position: 0px -1368px; }
    52.778%  { background-position: -732px -1368px; }
    55.556%  { background-position: -1464px -1368px; }
    58.333%  { background-position: -2196px -1368px; }
    61.111%  { background-position: -2928px -1368px; }
    63.889%  { background-position: -3660px -1368px; }
    66.667%  { background-position: 0px -1824px; }
    69.444%  { background-position: -732px -1824px; }
    72.222%  { background-position: -1464px -1824px; }
    75.0%    { background-position: -2196px -1824px; }
    77.778%  { background-position: -2928px -1824px; }
    80.556%  { background-position: -3660px -1824px; }
    83.333%  { background-position: 0px -2280px; }
    86.111%  { background-position: -732px -2280px; }
    88.889%  { background-position: -1464px -2280px; }
    91.667%  { background-position: -2196px -2280px; }
    94.444%  { background-position: -2928px -2280px; }
    97.222%  { background-position: -3660px -2280px; }
  }

  /* ── Progress steps ── */
  .steps {
    text-align: left;
    margin-top: 1rem;
  }
  .step {
    display: flex;
    align-items: baseline;
    padding: 0.2rem 0;
    font-size: 0.9rem;
    color: #999;
    transition: color 0.3s;
  }
  .step.active { color: #1976d2; }
  .step.done   { color: #333; }
  .step .icon {
    width: 1.2rem;
    flex-shrink: 0;
    text-align: center;
    margin-right: 0.5rem;
  }
  .step.done .icon { color: #2e7d32; }
  .step.active .icon { color: #1976d2; }
  .step .time {
    margin-left: auto;
    padding-left: 1rem;
    font-size: 0.8rem;
    color: #aaa;
    white-space: nowrap;
  }
  .step.done .time { color: #999; }
  .step.active .time { color: #1976d2; }
  .sub-steps {
    padding-left: 1.7rem;
  }
  .sub-steps .step {
    font-size: 0.82rem;
  }
  .step .label { flex: 1; }
  .group-time {
    font-size: 0.75rem;
    color: #aaa;
    text-align: right;
    padding: 0.1rem 0 0.2rem;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="signin-wrapper">
  <img class="logo" src="https://www.shadowaisolutions.com/SAIS_Logo.png" alt="Logo">
  <div class="app-title">Program Portal</div>
  <div class="signin-heading">Signing in…</div>
  <div class="dog-wrap"><div class="dog"></div></div>
  <div class="steps">
    <!-- Step 1 -->
    <div class="step" data-step="1">
      <span class="icon">○</span>
      <span class="label">Requesting sign-in from Google</span>
      <span class="time"></span>
    </div>
    <!-- Step 2 (group) -->
    <div class="step" data-step="2">
      <span class="icon">○</span>
      <span class="label">Exchanging credentials with server</span>
      <span class="time"></span>
    </div>
    <div class="sub-steps" data-parent="2">
      <div class="step" data-step="2a">
        <span class="icon">○</span>
        <span class="label">Connecting to server</span>
        <span class="time"></span>
      </div>
      <div class="step" data-step="2b">
        <span class="icon">○</span>
        <span class="label">Sending credentials</span>
        <span class="time"></span>
      </div>
      <div class="step" data-step="2c">
        <span class="icon">○</span>
        <span class="label">Server authenticating</span>
        <span class="time"></span>
      </div>
    </div>
    <!-- Step 3 -->
    <div class="step" data-step="3">
      <span class="icon">○</span>
      <span class="label">Setting up your secure session</span>
      <span class="time"></span>
    </div>
    <!-- Step 4 (group) -->
    <div class="step" data-step="4">
      <span class="icon">○</span>
      <span class="label">Loading the application</span>
      <span class="time"></span>
    </div>
    <div class="sub-steps" data-parent="4">
      <div class="step" data-step="4a">
        <span class="icon">○</span>
        <span class="label">Preparing interface</span>
        <span class="time"></span>
      </div>
      <div class="step" data-step="4b">
        <span class="icon">○</span>
        <span class="label">Initializing</span>
        <span class="time"></span>
      </div>
    </div>
    <!-- Step 5 -->
    <div class="step" data-step="5">
      <span class="icon">○</span>
      <span class="label">Sign-in complete</span>
      <span class="time"></span>
    </div>
  </div>
</div>

<script>
(function() {
  var steps = [
    { id: '1',  delay: 500,  duration: 300  },
    { id: '2',  delay: 200,  duration: 0, group: true },
    { id: '2a', delay: 200,  duration: 2000 },
    { id: '2b', delay: 200,  duration: 300  },
    { id: '2c', delay: 200,  duration: 3000 },
    { id: '3',  delay: 200,  duration: 400  },
    { id: '4',  delay: 200,  duration: 0, group: true },
    { id: '4a', delay: 200,  duration: 1500 },
    { id: '4b', delay: 200,  duration: 800  },
    { id: '5',  delay: 300,  duration: 0, final: true }
  ];

  var totalStart = performance.now();

  function fmt(ms) {
    return (ms / 1000).toFixed(1) + 's';
  }

  function getEl(id) {
    return document.querySelector('[data-step="' + id + '"]');
  }

  function setActive(id) {
    var el = getEl(id);
    if (!el) return;
    el.classList.add('active');
    el.querySelector('.icon').textContent = '●';
  }

  function setDone(id, elapsed) {
    var el = getEl(id);
    if (!el) return;
    el.classList.remove('active');
    el.classList.add('done');
    el.querySelector('.icon').textContent = '✓';
    if (elapsed !== undefined) {
      el.querySelector('.time').textContent = fmt(elapsed);
    }
  }

  function run(index, groupStart) {
    if (index >= steps.length) return;
    var s = steps[index];
    var el = getEl(s.id);

    setTimeout(function() {
      setActive(s.id);
      var stepStart = performance.now();

      if (s.final) {
        var totalTime = performance.now() - totalStart;
        setTimeout(function() {
          setDone(s.id);
          el.querySelector('.time').textContent = fmt(totalTime) + ' total';
          document.querySelector('.signin-heading').textContent = 'Signed in!';
          document.querySelector('.dog').style.animationPlayState = 'paused';
        }, 500);
        return;
      }

      if (s.group) {
        run(index + 1, performance.now());
        return;
      }

      setTimeout(function() {
        var elapsed = performance.now() - stepStart;
        setDone(s.id, elapsed);

        // If this is the last sub-step of a group, mark the parent done
        var next = steps[index + 1];
        var isLastInGroup = !next || (!next.id.startsWith(s.id.charAt(0)) || next.id.length <= 1);
        if (s.id.length > 1 && isLastInGroup) {
          var parentId = s.id.charAt(0);
          var groupElapsed = performance.now() - (groupStart || stepStart);
          setDone(parentId, groupElapsed);
          var timeEl = getEl(parentId).querySelector('.time');
          timeEl.textContent = fmt(groupElapsed) + ' group';
        }

        run(index + 1, groupStart);
      }, s.duration);
    }, s.delay);
  }

  run(0);
})();
</script>

</body>
</html>
