    var _lastDiffOps = null;
    var _lastTemplateOnly = false;

    // --- LCS-based line diff ---
    function lcs(a, b, eq) {
      var m = a.length, n = b.length;
      var dp = new Array(m + 1);
      for (var i = 0; i <= m; i++) { dp[i] = new Array(n + 1); dp[i][0] = 0; }
      for (var j = 0; j <= n; j++) dp[0][j] = 0;
      for (var i = 1; i <= m; i++)
        for (var j = 1; j <= n; j++)
          dp[i][j] = eq(a[i-1], b[j-1]) ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
      var result = [];
      var i = m, j = n;
      while (i > 0 && j > 0) {
        if (eq(a[i-1], b[j-1])) { result.unshift({ ai: i-1, bi: j-1 }); i--; j--; }
        else if (dp[i-1][j] >= dp[i][j-1]) i--;
        else j--;
      }
      return result;
    }

    // Character-level diff for modified lines
    function charDiff(oldStr, newStr) {
      var oldChars = oldStr.split(''), newChars = newStr.split('');
      var matches = lcs(oldChars, newChars, function(a,b){ return a === b; });
      var oldMarked = [], newMarked = [];
      var mi = 0, oi = 0, ni = 0;
      // Build old side
      var matchedOld = new Set(), matchedNew = new Set();
      for (var k = 0; k < matches.length; k++) { matchedOld.add(matches[k].ai); matchedNew.add(matches[k].bi); }
      for (var c = 0; c < oldChars.length; c++) {
        if (matchedOld.has(c)) oldMarked.push(escHtml(oldChars[c]));
        else oldMarked.push('<span class="char-del">' + escHtml(oldChars[c]) + '</span>');
      }
      for (var c = 0; c < newChars.length; c++) {
        if (matchedNew.has(c)) newMarked.push(escHtml(newChars[c]));
        else newMarked.push('<span class="char-add">' + escHtml(newChars[c]) + '</span>');
      }
      return { oldHtml: oldMarked.join(''), newHtml: newMarked.join('') };
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function normalizeLine(line, trimWs, ignoreCase) {
      var r = line;
      if (trimWs) r = r.replace(/^\s+|\s+$/g, '');
      if (ignoreCase) r = r.toLowerCase();
      return r;
    }

    // --- Strip PROJECT blocks (keep only TEMPLATE/shared code) ---
    function stripProjectBlocks(text) {
      var lines = text.split('\n');
      var result = [];
      var inProject = false;
      var projectStartRe = /PROJECT\s+START/;
      var projectEndRe = /PROJECT\s+END/;
      for (var i = 0; i < lines.length; i++) {
        if (projectStartRe.test(lines[i])) {
          inProject = true;
          continue;
        }
        if (projectEndRe.test(lines[i])) {
          inProject = false;
          continue;
        }
        // Also skip the ══════════════ divider lines adjacent to PROJECT markers
        if (!inProject) {
          result.push(lines[i]);
        }
      }
      return result.join('\n');
    }

    // --- Main compare function ---
    function compareTexts() {
      var leftText = document.getElementById('text-left').value;
      var rightText = document.getElementById('text-right').value;
      if (!leftText && !rightText) return;

      var trimWs = document.getElementById('chk-trim').checked;
      var ignoreCase = document.getElementById('chk-case').checked;
      var templateOnly = document.getElementById('chk-template-only').checked;

      if (templateOnly) {
        leftText = stripProjectBlocks(leftText);
        rightText = stripProjectBlocks(rightText);
      }

      var leftLines = leftText.split('\n');
      var rightLines = rightText.split('\n');

      var eq = function(a, b) { return normalizeLine(a, trimWs, ignoreCase) === normalizeLine(b, trimWs, ignoreCase); };
      var matches = lcs(leftLines, rightLines, eq);

      // Build diff operations
      var ops = [];
      var li = 0, ri = 0;
      for (var k = 0; k < matches.length; k++) {
        var m = matches[k];
        // Removed lines before this match
        while (li < m.ai) { ops.push({ type: 'removed', left: leftLines[li], leftNum: li+1, right: null, rightNum: null }); li++; }
        // Added lines before this match
        while (ri < m.bi) { ops.push({ type: 'added', left: null, leftNum: null, right: rightLines[ri], rightNum: ri+1 }); ri++; }
        // Equal line
        ops.push({ type: 'equal', left: leftLines[li], leftNum: li+1, right: rightLines[ri], rightNum: ri+1 }); li++; ri++;
      }
      while (li < leftLines.length) { ops.push({ type: 'removed', left: leftLines[li], leftNum: li+1, right: null, rightNum: null }); li++; }
      while (ri < rightLines.length) { ops.push({ type: 'added', left: null, leftNum: null, right: rightLines[ri], rightNum: ri+1 }); ri++; }

      // Merge adjacent removed+added into modified pairs
      var merged = [];
      var i = 0;
      while (i < ops.length) {
        if (ops[i].type === 'removed') {
          var remStart = i;
          while (i < ops.length && ops[i].type === 'removed') i++;
          var addStart = i;
          while (i < ops.length && ops[i].type === 'added') i++;
          var remCount = addStart - remStart;
          var addCount = i - addStart;
          var pairs = Math.min(remCount, addCount);
          for (var p = 0; p < pairs; p++) {
            merged.push({ type: 'modified', left: ops[remStart+p].left, leftNum: ops[remStart+p].leftNum, right: ops[addStart+p].right, rightNum: ops[addStart+p].rightNum });
          }
          for (var p = pairs; p < remCount; p++) merged.push(ops[remStart+p]);
          for (var p = pairs; p < addCount; p++) merged.push(ops[addStart+p]);
        } else {
          merged.push(ops[i]); i++;
        }
      }

      // Store for export and render
      _lastDiffOps = merged;
      _lastTemplateOnly = templateOnly;
      renderDiff(merged);
    }

    function renderDiff(ops) {
      var leftHtml = '', rightHtml = '';
      var stats = { total: 0, equal: 0, added: 0, removed: 0, modified: 0 };

      for (var i = 0; i < ops.length; i++) {
        var op = ops[i];
        stats.total++;
        if (op.type === 'equal') {
          stats.equal++;
          leftHtml += '<div class="diff-line equal"><span class="diff-line-num">'+op.leftNum+'</span><span class="diff-line-content">'+escHtml(op.left)+'</span></div>';
          rightHtml += '<div class="diff-line equal"><span class="diff-line-num">'+op.rightNum+'</span><span class="diff-line-content">'+escHtml(op.right)+'</span></div>';
        } else if (op.type === 'removed') {
          stats.removed++;
          leftHtml += '<div class="diff-line removed"><span class="diff-line-num">'+op.leftNum+'</span><span class="diff-line-content">'+escHtml(op.left)+'</span></div>';
          rightHtml += '<div class="diff-line empty"><span class="diff-line-num"></span><span class="diff-line-content"></span></div>';
        } else if (op.type === 'added') {
          stats.added++;
          leftHtml += '<div class="diff-line empty"><span class="diff-line-num"></span><span class="diff-line-content"></span></div>';
          rightHtml += '<div class="diff-line added"><span class="diff-line-num">'+op.rightNum+'</span><span class="diff-line-content">'+escHtml(op.right)+'</span></div>';
        } else if (op.type === 'modified') {
          stats.modified++;
          var cd = charDiff(op.left, op.right);
          leftHtml += '<div class="diff-line modified"><span class="diff-line-num">'+op.leftNum+'</span><span class="diff-line-content">'+cd.oldHtml+'</span></div>';
          rightHtml += '<div class="diff-line modified"><span class="diff-line-num">'+op.rightNum+'</span><span class="diff-line-content">'+cd.newHtml+'</span></div>';
        }
      }

      document.getElementById('stat-total').textContent = stats.total;
      document.getElementById('stat-equal').textContent = stats.equal;
      document.getElementById('stat-added').textContent = stats.added;
      document.getElementById('stat-removed').textContent = stats.removed;
      document.getElementById('stat-modified').textContent = stats.modified;
      document.getElementById('stats-bar').style.display = 'flex';
      document.getElementById('copy-diff-controls').style.display = 'flex';

      if (stats.total === stats.equal && stats.total > 0) {
        document.getElementById('diff-left').innerHTML = '';
        document.getElementById('diff-right').innerHTML = '';
        document.getElementById('diff-output').style.display = 'block';
        var identicalMsg = _lastTemplateOnly
          ? '✓ Template code is identical (' + stats.total + ' lines) — only PROJECT blocks differ'
          : '✓ Texts are identical (' + stats.total + ' lines)';
        document.getElementById('no-results').innerHTML = '<div class="identical-msg">' + identicalMsg + '</div>';
        document.getElementById('no-results').style.display = 'block';
      } else {
        document.getElementById('no-results').style.display = 'none';
        document.getElementById('diff-output').style.display = 'block';
        document.getElementById('diff-left').innerHTML = leftHtml;
        document.getElementById('diff-right').innerHTML = rightHtml;
      }

      // Sync scroll
      var diffLeft = document.getElementById('diff-left');
      var diffRight = document.getElementById('diff-right');
      var syncing = false;
      diffLeft.parentElement.onscroll = function() {
        if (syncing) return; syncing = true;
        diffRight.parentElement.scrollTop = diffLeft.parentElement.scrollTop;
        syncing = false;
      };
      diffRight.parentElement.onscroll = function() {
        if (syncing) return; syncing = true;
        diffLeft.parentElement.scrollTop = diffRight.parentElement.scrollTop;
        syncing = false;
      };
    }

    // --- Generate unified diff for clipboard ---
    function generateContextDiff() {
      if (!_lastDiffOps || _lastDiffOps.length === 0) return '';
      var contextN = parseInt(document.getElementById('context-lines').value) || 3;
      var ops = _lastDiffOps;

      // Find indices of all non-equal ops
      var changeIndices = [];
      for (var i = 0; i < ops.length; i++) {
        if (ops[i].type !== 'equal') changeIndices.push(i);
      }
      if (changeIndices.length === 0) return '(No differences found)';

      // Build hunk ranges with context
      var hunks = [];
      var hStart = Math.max(0, changeIndices[0] - contextN);
      var hEnd = Math.min(ops.length - 1, changeIndices[0] + contextN);
      for (var c = 1; c < changeIndices.length; c++) {
        var nStart = Math.max(0, changeIndices[c] - contextN);
        var nEnd = Math.min(ops.length - 1, changeIndices[c] + contextN);
        if (nStart <= hEnd + 1) {
          hEnd = nEnd;
        } else {
          hunks.push({ start: hStart, end: hEnd });
          hStart = nStart;
          hEnd = nEnd;
        }
      }
      hunks.push({ start: hStart, end: hEnd });

      // Emit unified diff output
      var output = '';
      if (_lastTemplateOnly) {
        output += '# Template-Only Comparison (PROJECT blocks stripped)\n';
        output += '# Differences below are in TEMPLATE/shared foundational code only.\n';
        output += '# If no differences appear, the template code is identical.\n\n';
      }
      output += '--- Original\n+++ Changed\n';
      for (var h = 0; h < hunks.length; h++) {
        var hunk = hunks[h];
        var lStart = null, lCount = 0, rStart = null, rCount = 0;
        for (var i = hunk.start; i <= hunk.end; i++) {
          var op = ops[i];
          if (op.type === 'equal' || op.type === 'removed' || op.type === 'modified') {
            if (lStart === null) lStart = op.leftNum;
            lCount++;
          }
          if (op.type === 'equal' || op.type === 'added' || op.type === 'modified') {
            if (rStart === null) rStart = op.rightNum;
            rCount++;
          }
        }
        output += '@@ -' + (lStart || 1) + ',' + lCount + ' +' + (rStart || 1) + ',' + rCount + ' @@\n';
        for (var i = hunk.start; i <= hunk.end; i++) {
          var op = ops[i];
          if (op.type === 'equal') {
            output += ' ' + op.left + '\n';
          } else if (op.type === 'removed') {
            output += '-' + op.left + '\n';
          } else if (op.type === 'added') {
            output += '+' + op.right + '\n';
          } else if (op.type === 'modified') {
            output += '-' + op.left + '\n';
            output += '+' + op.right + '\n';
          }
        }
      }
      return output;
    }

      updateCounts();
    });
    document.getElementById('btn-clear').addEventListener('click', function() {
      document.getElementById('text-left').value = '';
      document.getElementById('text-right').value = '';
      document.getElementById('stats-bar').style.display = 'none';
      document.getElementById('copy-diff-controls').style.display = 'none';
      document.getElementById('diff-output').style.display = 'none';
      document.getElementById('no-results').style.display = 'block';
      document.getElementById('no-results').innerHTML = 'Enter text in both fields and click Compare';
      _lastDiffOps = null;
      _lastTemplateOnly = false;
      updateCounts();
    });

    function updateCounts() {
      var l = document.getElementById('text-left').value;
      var r = document.getElementById('text-right').value;
      document.getElementById('count-left').textContent = l.length + ' chars, ' + (l ? l.split('\n').length : 0) + ' lines';
      document.getElementById('count-right').textContent = r.length + ' chars, ' + (r ? r.split('\n').length : 0) + ' lines';
    }
    document.getElementById('text-left').addEventListener('input', updateCounts);
    document.getElementById('text-right').addEventListener('input', updateCounts);

    // Copy context diff to clipboard
    document.getElementById('btn-copy-diff').addEventListener('click', function() {
      var diffText = generateContextDiff();
      if (!diffText) return;
      var btn = document.getElementById('btn-copy-diff');
      navigator.clipboard.writeText(diffText).then(function() {
        var orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
      }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = diffText;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy Context Diff'; btn.classList.remove('copied'); }, 2000);
      });
    });

    // Compare on Ctrl+Enter
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') compareTexts();
    });
